server {
    listen 80;
    server_name _;

    # Increase max upload size (PDFs can be large)
    client_max_body_size 200M;

    # ── Static frontend ──────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Go API Backend ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Python PDF Service ────────────────────────────────────
    location /pdf-api/ {
        proxy_pass         http://pdf-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 200M;
    }

    # ── Stirling-PDF (extra PDF tools) ───────────────────────
    # Stirling runs with CONTEXT_PATH=/stirling inside the container.
    # Docker Compose service name "stirling-pdf" is used for DNS.
    location /stirling/ {
        proxy_pass         http://stirling-pdf:8080/stirling/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 200M;
    }
}
