# ═══════════════════════════════════════════════════════════════
#  DocFlow — Production Docker Compose
#  Services: postgres | backend | pdf-service | frontend
#  Deploy: Portainer → Stacks → Add Stack → Upload this file
# ═══════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: docflow-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-docflow}
      POSTGRES_USER:     ${POSTGRES_USER:-docflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-DocFlow2025!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docflow} -d ${POSTGRES_DB:-docflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - docflow-net

  # ─── Go + Fiber API Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docflow-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:    postgres://${POSTGRES_USER:-docflow}:${POSTGRES_PASSWORD:-DocFlow2025!}@postgres:5432/${POSTGRES_DB:-docflow}?sslmode=disable
      JWT_SECRET:      ${JWT_SECRET:-change-this-to-a-random-64char-string}
      PDF_SERVICE_URL: http://pdf-service:8000
      PORT:            8080
      TZ:              ${TZ:-Europe/Istanbul}
    volumes:
      - uploads:/app/uploads
      - archives:/app/archives
      - logs:/app/logs
      - themes:/app/themes
    restart: unless-stopped
    networks:
      - docflow-net

  # ─── Python PDF Service (PyMuPDF) ────────────────────────────
  pdf-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docflow-pdf
    volumes:
      - pdf_sessions:/tmp/pdf_sessions
    restart: unless-stopped
    networks:
      - docflow-net

  # ─── Stirling-PDF (extra PDF tools) ──────────────────────────
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: docflow-stirling
    environment:
      DOCKER_ENABLE_SECURITY:      "false"   # Giriş zorunluluğunu kapat (2.x doğru değişken)
      DISABLE_ADDITIONAL_FEATURES: "true"    # Lisans gerektiren proprietary özellikleri kapat
      CONTEXT_PATH:                "/stirling"
      SYSTEM_ROOTURIPATH:          "/stirling"
    volumes:
      - stirling_data:/usr/share/StirlingPDF
      - stirling_configs:/configs
    restart: unless-stopped
    networks:
      - docflow-net

  # ─── Nginx + HTML Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docflow-frontend
    ports:
      - "${FRONTEND_PORT:-3331}:80"
    depends_on:
      - backend
      - pdf-service
    restart: unless-stopped
    networks:
      - docflow-net

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
    name: docflow_postgres
  uploads:
    name: docflow_uploads
  archives:
    name: docflow_archives
  logs:
    name: docflow_logs
  themes:
    name: docflow_themes
  pdf_sessions:
    name: docflow_pdf_sessions
  stirling_data:
    name: docflow_stirling
  stirling_configs:
    name: docflow_stirling_configs

# ─── Network ──────────────────────────────────────────────────
networks:
  docflow-net:
    name: docflow_network
    driver: bridge
